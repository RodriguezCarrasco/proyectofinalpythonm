<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Fondo -->
  <rect width="100%" height="100%" fill="black"></rect>

  <!-- Texto superior -->
  <text x="250" y="60" font-size="28" fill="black" text-anchor="middle" font-family="Arial">
    Software
  </text>

  <!-- Línea curva superior -->
  <path d="M100,120 Q250,60 400,120" stroke="blue" fill="transparent" stroke-width="3"></path>

  <!-- Nombre principal curveado -->
  <text x="250" y="130" font-size="40" fill="blue" text-anchor="middle" font-family="Verdana">
    JovanyAxel
  </text>

  <!-- Línea curva inferior -->
  <path d="M100,150 Q250,200 400,150" stroke="blue" fill="transparent" stroke-width="3"></path>

  <!-- Silueta de tenis (simplificada) -->
  <path d="M180 250 Q220 200 320 230 Q360 260 300 280 L200 280 Q170 270 180 250 Z" fill="white"></path>

  <!-- Texto inferior gótico -->
  <text x="250" y="350" font-size="30" fill="red" text-anchor="middle" font-family="Old English Text MT, serif">
    JovanyAxel 2026
  </text>

  <!-- Estrella -->
  <polygon points="250,370 260,400 290,400 265,420 275,450 250,430 225,450 235,420 210,400 240,400" fill="red"></polygon>

</svg>